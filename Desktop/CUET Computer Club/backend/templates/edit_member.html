<!DOCTYPE html>
<html>
<head>
    <title>Edit Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Edit Executive Member</h2>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" value="{{ member[1] }}" required>
</div>

<div class="mb-3">
<label class="form-label">Role</label>
<input type="text" name="role" class="form-control" value="{{ member[2] }}" required>
</div>

<div class="mb-3">
<label class="form-label">Upload New Image (optional)</label>
<input type="file" name="image" class="form-control">
</div>

<button type="submit" class="btn btn-primary">Update Member</button>
<a href="/admin/dashboard" class="btn btn-secondary">Back</a>

</form>

</div>

</body>
</html>
